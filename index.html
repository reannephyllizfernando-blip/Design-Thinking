<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>student buddy · english</title>
  <style>
    
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    
    .bg-switch {
      background: white;
      max-width: 500px;
      margin: 10px auto;
      padding: 15px;
      border-radius: 40px;
      display: flex;
      gap: 8px;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .bg-btn {
      background: #c0d4ec;
      border: none;
      padding: 8px 15px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .bg-btn:hover { background: #a8c1df; }

    .card {
      background: white;
      max-width: 500px;
      margin: 15px auto;
      padding: 20px;
      border-radius: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    h2 { margin: 0 0 15px; display: flex; gap: 10px; align-items: center; }

    .student-list {
      background: #f4f9ff;
      border-radius: 30px;
      padding: 8px 0;
      min-height: 150px;
      margin-bottom: 20px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #ccc;
      padding: 12px 18px;
      text-align: left;
    }
    .item:last-child { border-bottom: none; }

    .name { font-weight: bold; font-size: 18px; }
    .grade-badge {
      background: #f4b642;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: bold;
    }

    .del-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #a6a6a6;
    }

    .input-area {
      background: #f4f9ff;
      border-radius: 36px;
      padding: 18px;
    }
    input, select {
      width: 90%;
      padding: 12px 18px;
      margin: 8px 0;
      border: none;
      border-radius: 40px;
      background: white;
      font-size: 15px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      background: #2a7faa;
      color: white;
      border: none;
      padding: 14px 10px;
      border-radius: 40px;
      font-weight: bold;
      flex: 1;
      cursor: pointer;
    }
    .clear-btn { background: #98a9b9; }
    .empty { padding: 30px; color: #6f7e8f; font-style: italic; }
  </style>
</head>
<body id="mainBody">

  
  <div class="bg-switch">
    <button class="bg-btn" onclick="changeBg('#eef2f7')">☀️ light</button>
    <button class="bg-btn" onclick="changeBg('#d4ddee')">⛅ medium</button>
    <button class="bg-btn" onclick="changeBg('#1f2a36')">🌙 dark</button>
  </div>


  <div class="card">
    <h2>📋 student · barangay list</h2>

    
    <div id="listContainer" class="student-list">
      <div class="empty">➕ no students yet</div>
    </div>

   
    <div class="input-area">
      <input id="nameInput" placeholder="full name" maxlength="40">
      <select id="gradeSelect">
        <option>G7</option><option>G8</option><option>G9</option><option>G10</option>
        <option>G11</option><option>G12</option><option>college</option>
      </select>
      <input id="detailInput" placeholder="zone / need (optional)">

      <div class="row">
        <button id="addBtn">➕ add</button>
        <button id="clearBtn" class="clear-btn">🗑️ clear all</button>
      </div>
    </div>
    <p style="margin:16px 0 6px; font-size:14px;">✨ find study buddies · for students</p>
  </div>

  <script>
    
    window.changeBg = function(color) {
      document.getElementById('mainBody').style.backgroundColor = color;
      localStorage.setItem('bgColorPref', color);
    };
    
    const saved = localStorage.getItem('bgColorPref');
    if (saved) document.getElementById('mainBody').style.backgroundColor = saved;

   
    let students = JSON.parse(localStorage.getItem('buddyList')) || [
      { id: Date.now()-3000, name: 'Alex Rivera', grade: 'G10', detail: 'zone 2, needs math' },
      { id: Date.now()-1500, name: 'Jamie Cruz', grade: 'G12', detail: 'can help with science' }
    ];

    const listDiv = document.getElementById('listContainer');
    const nameInp = document.getElementById('nameInput');
    const gradeSel = document.getElementById('gradeSelect');
    const detInp = document.getElementById('detailInput');

    function display() {
      if (!students.length) {
        listDiv.innerHTML = '<div class="empty">➕ list empty — add a student</div>';
        return;
      }
      let html = '';
      
      [...students].sort((a,b) => b.id - a.id).forEach(s => {
        
        let safeName = (s.name || '').replace(/[&<>]/g, c => 
          c=='&'?'&amp;':c=='<'?'&lt;':c=='>'?'&gt;':c);
        let safeDetail = (s.detail || '—').replace(/[&<>]/g, c => 
          c=='&'?'&amp;':c=='<'?'&lt;':c=='>'?'&gt;':c);
        html += `<div class="item">
          <div><span class="name">${safeName}</span><br><span>${s.grade} · ${safeDetail}</span></div>
          <div style="display:flex; align-items:center; gap:8px">
            <span class="grade-badge">${s.grade}</span>
            <button class="del-btn" onclick="delStudent(${s.id})">✕</button>
          </div>
        </div>`;
      });
      listDiv.innerHTML = html;
    }

    window.delStudent = function(id) {
      students = students.filter(s => s.id !== id);
      localStorage.setItem('buddyList', JSON.stringify(students));
      display();
    };

    document.getElementById('addBtn').onclick = () => {
      let nameVal = nameInp.value.trim();
      if (!nameVal) {
        alert('Please enter a name');
        return;
      }
      students.push({
        id: Date.now(),
        name: nameVal,
        grade: gradeSel.value,
        detail: detInp.value.trim() || '—'
      });
      localStorage.setItem('buddyList', JSON.stringify(students));
      nameInp.value = '';
      detInp.value = '';
      display();
    };

    document.getElementById('clearBtn').onclick = () => {
      if (students.length && confirm('Remove all students?')) {
        students = [];
        localStorage.setItem('buddyList', JSON.stringify(students));
        display();
      }
    };

    
    display();
  </script>
</body>
</html>
